name: 📄 Post Reviews

on:
  workflow_call:

jobs:
  markdown-lint:
    name: 📝 Markdown Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HUSKY: 0
      TURBO_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node and Install Dependencies
        uses: ./.github/actions/setup-install

      - name: Check File Format
        run: yarn turbo run lint:markdown

  text-lint:
    name: ✍️ Text Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HUSKY: 0
      TURBO_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node and Install Dependencies
        uses: ./.github/actions/setup-install

      - name: Check File Format
        run: yarn turbo run lint:text
