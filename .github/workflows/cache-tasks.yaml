name: 💾 Cache Tasks

on:
  workflow_call:

permissions:
  actions: write
  contents: read

jobs:
  merge-and-save:
    name: 🔄 Merge and Save Task Cache
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      CACHE_PATH: ./.turbo/cache

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download Task Cache Artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: task-cache-*
          path: ${{ env.CACHE_PATH }}
          merge-multiple: true
        continue-on-error: true

      - name: Show Cache Stats
        run: |
          echo "📦 Merged Task Cache Contents:"
          if [ -d "${{ env.CACHE_PATH }}" ]; then
            ls -lh ${{ env.CACHE_PATH }} | tail -20
            echo ""
            echo "📊 Cache Statistics:"
            echo "Total files: $(find ${{ env.CACHE_PATH }} -type f | wc -l)"
            echo "Total size: $(du -sh ${{ env.CACHE_PATH }})"
          else
            echo "⚠️ No cache directory found"
          fi

      - name: Purge Old Task Caches
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🗑️ Purging old Task caches..."

          FILTER=".[] | select(.key | startswith(\"${{ runner.os }}-Task-main\")) | .id"
          CACHES=$(gh cache list --json id,key --jq "$FILTER")

          if [ -n "$CACHES" ]; then
            echo "Found caches to delete:"
            echo "$CACHES" | while read -r cache_id; do
              echo "Deleting cache ID: $cache_id"
              gh cache delete "$cache_id" || true
            done
            echo "✅ Old caches purged successfully"
          else
            echo "No old caches found to delete"
          fi

      - name: Save Merged Cache
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ${{ env.CACHE_PATH }}
          key: ${{ runner.os }}-Task-main
